name: Helm Lint

on:
  workflow_dispatch:
  push:
    paths:
      - "helm-chart/**"
      - ".github/workflows/helm-lint.yml"
  pull_request:
    paths:
      - "helm-chart/**"
      - ".github/workflows/helm-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - name: Lint (dev values)
        run: helm lint helm-chart -f helm-chart/values-dev.yaml
      - name: Lint (prod values)
        run: helm lint helm-chart -f helm-chart/values-prod.yaml
